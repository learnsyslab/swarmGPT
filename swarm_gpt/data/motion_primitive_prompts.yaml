# Prompts for motion-primitive choreography. user_initial is .format()-expanded in choreographer.
# Coordinates use integer cm (z=100 is 1 m) for fewer tokenizer splits than floats.
system_initial: |
  You choreograph drone swarms using motion primitives. Choose primitives that match the music;
  respect timing, collision, and step limits. Coordinates are integer cm.

user_initial: >
  Plan a beat-by-beat choreography for {num_drones} drones to "{song}".

  <song>
  beats: {num_beats}
  beat_times_100ms: {beat_times}
  beat_intervals_100ms: {beat_intervals}
  amplitude_dbfs: {dbfs}
  novelty_pct: {beat_novelty}
  chords: {chords}
  </song>

  <drones>
  count: {num_drones}
  start_cm: {starting_pos}
  max_step_cm_per_beat: {max_distances}
  bounds_cm: lower={lim_lower} upper={lim_upper}
  </drones>

  <rules>
  - Exactly {num_waypoints} beats (keys 1..{num_beats}); one choreography line per beat; end with END.
  - No two drones share the same position at the same beat.
  - Respect max_step_cm_per_beat and bounds_cm; z > 0.
  - Tie motion to music: louder/novel beats -> bolder primitives; all drones move on loud+novel beats when possible.
  - Prefer symmetric formations and varied 3D motion (altitude changes, geometric shapes).
  - At most 4 multi-beat primitives per song; prefer spiral, helix, zig_zag, wave over trivial moves.
  - Put an extra PLAN beat between primitive changes (transition buffer).
  - One beat = one line. Multiple calls on one beat: separate with "; " (e.g. center([1,2]); move_z([3], 10)).
  - Each drone touched at most once per beat (except separate move() per drone).
  </rules>

  <primitives>
  Single-beat (no PLAN after):
  - rotate(angle_deg, axis) — all drones; axis usually 'z'
  - center([ids]) — listed drones to formation around their centroid
  - move_z([ids], delta_cm) — vertical shift
  - form_circle([ids], height_cm) — circle at height; radius from count
  - form_star(height_cm, spacing 40-80, delta_radius 50-100)
  - form_cone(delta_height 30-80, spacing 40-80, is_inverted 0|1)
  - swap(id1, id2) — swap two drones (only one swap pair per beat)
  - move(x_cm, y_cm, z_cm, drone_id) — absolute position for one drone

  Multi-beat (steps in [2,3]; follow with steps-1 PLAN lines; start by beat s-steps+1 so it finishes before END):
  - spiral(steps, height_cm)
  - spiral_speed(steps, height_cm, angle_deg 0-360, radius_increase 1-3)
  - helix(steps, delta_h_cm 0-100, height_cm 50-100)
  - twister(steps, omega_x10 2-20, z_spacing_cm 5-30)
  - zig_zag(steps, delta_xy_cm, delta_z_cm)
  - wave(steps, height, mu_pairs, a_coeffs, b_coeffs) — 2D wave surface; equation:
  {wave_eqn}

  PLAN — hold positions for one beat (also fills multi-beat tails). Never end the song on a multi-beat primitive without trailing PLANs.
  </primitives>

  <process>
  1) song_mood — brief mood for "{song}".
  2) cord_analysis — chords, major/minor, emotional effect.
  3) choreography_plan — sections, primitives, and why; scale intensity to dbfs/novelty/intervals.
  4) choreography — full beat list 1..{num_beats}, no "..." placeholders.
  </process>

example: |
  <example>
  Input: song=rêverie, drones=3, beats=22 (quiet dbfs ~-50..-30; novelty peak ~98 at beat 6).
  Output:
  song_mood: Dreamy, contemplative Debussy; gentle fluid motion.
  cord_analysis: Cm, A#m, F, Gm mix — wistful, not dramatic.
  choreography_plan: Beats 1-5: slow spiral inward (low novelty). Beat 6+: rotate and move_z on peak. Mid song: second spiral + zig_zag. Use PLAN between primitive changes; keep steps small for quiet dynamics.
  choreography:
    1: spiral(5, 100)
    2: PLAN
    3: PLAN
    4: PLAN
    5: PLAN
    6: PLAN
    7: rotate(60, 'z')
    8: PLAN
    9: rotate(-90, 'z')
    10: PLAN
    11: move_z([1, 2, 3], 30)
    12: PLAN
    13: spiral(4, 100)
    14: PLAN
    15: PLAN
    16: PLAN
    17: PLAN
    18: zig_zag(5, 20, 20)
    19: PLAN
    20: PLAN
    21: PLAN
    22: PLAN
    END
  </example>

output_format: |
  Return one ```yaml``` block:

  song_mood: <string>
  cord_analysis: <string>
  choreography_plan: <string>
  choreography:
    1: <primitive calls or PLAN>
    ...
    N: <primitive calls or PLAN>
    END

  Every beat 1..N present. Use "; " for multiple calls on one beat. No ellipsis rows. Multi-beat primitives must include trailing PLAN lines.

output_format_structured: |
  Return JSON only (no markdown). Schema enforces exactly num_beats beats and typed primitive args.
  Rules still apply: musically coherent choices, PLAN tails for multi-beat primitives, transition PLAN between primitive changes, at most 4 multi-beat primitives, respect bounds and step limits.
